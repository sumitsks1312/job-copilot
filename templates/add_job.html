{% extends "base.html" %}
{% block title %}Add Application – Job Copilot{% endblock %}

{% block content %}
<div class="form-card">
  <div class="form-card-header">
    <h2>Add Job Application</h2>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline btn-sm">← Back</a>
  </div>

  <form method="POST" action="{{ url_for('add_job') }}" novalidate>
    <div class="form-group">
      <label for="company_name">Company Name</label>
      <input type="text" id="company_name" name="company_name" required placeholder="e.g. Acme Corp" />
    </div>
    <div class="form-group">
      <label for="job_role">Job Role</label>
      <input type="text" id="job_role" name="job_role" required placeholder="e.g. Software Engineer" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status">
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>
      </div>
      <div class="form-group">
        <label for="date_applied">Date Applied</label>
        <input type="date" id="date_applied" name="date_applied" value="{{ today }}" required />
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Save Application</button>
  </form>
</div>
{% endblock %}
