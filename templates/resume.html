{% extends "base.html" %}
{% block title %}Resume – Job Copilot{% endblock %}

{% block content %}
<div class="page-header">
  <h2>My Resume</h2>
</div>

<!-- Resume card -->
<div class="resume-card">

  {% if user.resume_path %}
  <!-- File info -->
  <div class="resume-file-row">
    <div class="resume-file-icon">📄</div>
    <div class="resume-file-info">
      <span class="resume-file-name">{{ user.resume_path.split('/')[-1] | replace('user_' ~ session.user_id ~ '_', '') }}</span>
      <span class="resume-file-meta">Uploaded resume</span>
    </div>
    <a href="{{ url_for('serve_upload', filename=user.resume_path.split('/')[-1]) }}" target="_blank" class="btn btn-outline btn-sm">
      View / Download
    </a>
  </div>
  <hr class="resume-divider" />
  {% endif %}

  <!-- Upload form -->
  <form method="POST" action="{{ url_for('upload_resume') }}" enctype="multipart/form-data" class="upload-form">
    <label class="upload-label">
      {% if user.resume_path %}Replace resume{% else %}Upload your resume{% endif %}
      <span class="upload-hint">(PDF or DOCX, max 10 MB)</span>
    </label>
    <div class="upload-controls">
      <input type="file" name="resume" accept=".pdf,.docx" class="file-input" />
      <button type="submit" class="btn btn-outline">Upload</button>
    </div>
  </form>

</div>

{% endblock %}
