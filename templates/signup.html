{% extends "base.html" %}
{% block title %}Sign Up – Job Copilot{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="auth-header">
    <h1>✈ Job Copilot</h1>
    <p>Your co-pilot for every job application.</p>
  </div>

  <h2>Create Account</h2>
  <form method="POST" action="{{ url_for('signup') }}" novalidate>
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required placeholder="johndoe" />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="john@example.com" />
    </div>
    <div class="form-group">
      <label for="password">Password <small>(min 8 chars)</small></label>
      <input type="password" id="password" name="password" required placeholder="••••••••" />
    </div>
    <button type="submit" class="btn btn-primary btn-block">Create Account</button>
  </form>
  <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
