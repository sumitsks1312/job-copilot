{% extends "base.html" %}
{% block title %}Edit Application – Job Copilot{% endblock %}

{% block content %}
<div class="form-card">
  <div class="form-card-header">
    <h2>Edit Application</h2>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline btn-sm">← Back</a>
  </div>

  <form method="POST" action="{{ url_for('edit_job', job_id=job.id) }}" novalidate>
    <div class="form-group">
      <label for="company_name">Company Name</label>
      <input type="text" id="company_name" name="company_name"
             value="{{ job.company_name }}" required />
    </div>
    <div class="form-group">
      <label for="job_role">Job Role</label>
      <input type="text" id="job_role" name="job_role"
             value="{{ job.job_role }}" required />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status" onchange="toggleDateField(this.value)">
          {% for s in ['Saved', 'Applied', 'Interview', 'Offer', 'Rejected'] %}
            <option value="{{ s }}" {% if job.status == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" id="date-applied-group">
        <label for="date_applied">Date Applied</label>
        <input type="date" id="date_applied" name="date_applied"
               value="{{ job.date_applied }}" />
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Update Application</button>
  </form>
</div>
<script>
function toggleDateField(status) {
  document.getElementById('date-applied-group').style.display = status === 'Applied' ? '' : 'none';
}
toggleDateField(document.getElementById('status').value);
</script>
{% endblock %}
